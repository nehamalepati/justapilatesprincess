  <link rel="stylesheet" href="styles.css">
  <style>
    /* ---------- card page: one centered column, phone-first ---------- */
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 2.5rem) 1rem;
    }

    .card {
      width: min(100%, 420px);
      background: var(--paper);
      border-radius: 26px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(123, 94, 167, 0.16);
      padding: 2.4rem 1.6rem 1.7rem;
      text-align: center;
    }

    .card .crown {
      color: var(--marigold);
      display: flex;
      justify-content: center;
      margin-bottom: 0.9rem;
    }

    .card-logo {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      object-fit: cover;
      margin-inline: auto;
      box-shadow:
        0 0 0 1.5px var(--marigold-soft),
        0 14px 34px rgba(51, 34, 75, 0.18);
    }

    .card .name-lockup {
      justify-content: center;
      margin-top: 1.3rem;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.55rem;
      line-height: 1.2;
      row-gap: 0.1rem;
    }
    .card .name-lockup .telugu { font-size: 1.15em; }
    .card .name-en { font-style: italic; }

    .tagline {
      margin-top: 0.55rem;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--ink-soft);
    }

    /* rangoli scallop between the name and the links */
    .card-scallop {
      display: flex;
      justify-content: center;
      color: var(--marigold-soft);
      margin: 1.4rem 0 1.5rem;
    }
    .card-scallop svg { width: 96px; height: 22px; }

    /* ---------- the star: mailing list row ---------- */
    .mailing-cta {
      display: block;
      text-decoration: none;
      border-radius: 18px;
      padding: 1.05rem 1.2rem;
      background: linear-gradient(140deg, var(--marigold), #b5791f);
      color: #fffaf0;
      box-shadow:
        0 0 0 1.5px var(--marigold-soft),
        0 12px 28px rgba(201, 139, 45, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .mailing-cta:hover, .mailing-cta:focus-visible {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1.5px var(--marigold-soft),
        0 16px 34px rgba(201, 139, 45, 0.45);
    }
    .mailing-cta .big {
      display: block;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.3rem;
      line-height: 1.25;
    }
    .mailing-cta .small {
      display: block;
      margin-top: 0.25rem;
      font-size: 0.83rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fdf3dd;
    }
    :root[data-theme="dark"] .mailing-cta {
      background: linear-gradient(140deg, var(--marigold), #c98b2d);
      color: var(--night);
    }
    :root[data-theme="dark"] .mailing-cta .small { color: #4a3512; }

    /* ---------- link rows ---------- */
    .links {
      display: grid;
      gap: 0.6rem;
      margin-top: 1.5rem;
      text-align: left;
    }
    .link-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      min-height: 54px;
      padding: 0.72rem 1rem;
      border: 1.5px solid rgba(123, 94, 167, 0.28);
      border-radius: 16px;
      text-decoration: none;
      color: var(--ink);
      background: transparent;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }
    .link-row:hover, .link-row:focus-visible {
      border-color: var(--violet);
      background: rgba(123, 94, 167, 0.07);
      transform: translateX(2px);
    }
    .link-row .ico {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--lilac-wash);
      color: var(--violet);
    }
    .link-row .label {
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
    }
    .link-row .sub {
      margin-left: auto;
      flex: 1 1 0;
      min-width: 0;
      text-align: right;
      font-size: 0.78rem;
      color: var(--ink-soft);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ---------- quiet footer ---------- */
    .card-foot {
      margin-top: 1.6rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }
    .card-foot a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid var(--marigold-soft);
      padding-bottom: 1px;
    }
    .card-foot a:hover { color: var(--violet); }

    /* ---------- gentle entrance ---------- */
    @keyframes card-rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: none; }
    }
    .card > * { animation: card-rise 0.6s ease both; }
    .card > *:nth-child(2) { animation-delay: 0.07s; }
    .card > *:nth-child(3) { animation-delay: 0.14s; }
    .card > *:nth-child(4) { animation-delay: 0.21s; }
    .card > *:nth-child(5) { animation-delay: 0.28s; }
    .card > *:nth-child(6) { animation-delay: 0.35s; }
    .card > *:nth-child(7) { animation-delay: 0.42s; }
    .card > *:nth-child(8) { animation-delay: 0.49s; }

    @media (prefers-reduced-motion: reduce) {
      .card > * { animation: none; }
      .mailing-cta:hover, .link-row:hover { transform: none; }
    }

    @media (max-width: 380px) {
      .card { padding: 2rem 1.15rem 1.5rem; }
      .card .name-lockup { font-size: 1.35rem; }
      .link-row .sub { font-size: 0.72rem; }
    }
  </style>
</head>
